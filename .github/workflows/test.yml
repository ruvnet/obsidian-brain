name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --fund=false

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Syntax-check bundle
        run: node --check main.js
